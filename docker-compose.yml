version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: nexora-db
    environment:
      POSTGRES_DB: nexora
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora -d nexora"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexora-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/nexora
      DB_USERNAME: nexora
      DB_PASSWORD: nexora123
      JWT_SECRET: super-secret-key-change-me
      MAIL_USERNAME: your-email@gmail.com
      MAIL_PASSWORD: your-app-password
    ports:
      - "8081:8081"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexora-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    environment:
      VITE_API_TARGET: http://backend:8081

volumes:
  postgres_data:
